  mutations:
    name: "clean_name(name)"
    age: "as.integer(age)"
    dod: "as_date(mdy(date_of_death))"
    calendar_year: "as.numeric(cy) + 2000"
    fiscal_year: "as.numeric(fy) + 2000"
    dob: "as_date(mdy(do_b))"
    death_location_unsplit: |
      str_replace_all(place_of_death, '\\s+', ' ')
    death_location_validation: |
      str_replace_all(death_location_unsplit, '[^A-Za-z]', '')
    death_location: "str_split_i(place_of_death, '\n', 1)"
    death_city: "get_location_city(place_of_death)"
    death_state: "get_location_state(place_of_death)"
    last_updated: "now()"
    ice_death_report: "str_replace(ice_death_report, '^[^h].*$', '')"
  renamings:
    state: state_territory
    contractor_old: contractor
    contractor_type_old: contractor_type
  joins:
    - how: left
      right: facility_crosswalk
      by: detention_center == detention_center_raw
    - how: left
      right: facilities
      by: detention_center_id
  filters:
    - "!(name == 'Jose Castro Rivera' & dod == ymd('2025-10-23'))"
    - "!(name == 'Francisco Castaneda' & dod == ymd('2008-02-01'))"
    - "!(name == 'Martin Arellano Vargas' & dod == ymd('2021-03-08'))"
    - "!(name == 'Oscar Lopez Acosta' & dod == ymd('2020-05-10'))"
    - "!(name == 'Johana Medina Leon' & dod == ymd('2019-06-01'))"
    - "!(str_detect(name, 'Francisco Castaneda') & dod == ymd('2008-02-01'))"
    - "fiscal_year >= 2004"
    - "year(dod) >= 2003"
    - "dod < ymd('2026-02-20')"
  output_columns:
    - name
    - dod
    - calendar_year
    - fiscal_year
    - listed_citizenship
    - gender
    - age
    - dob
    - death_location
    - death_city
    - death_state
    - detention_center_id
    - detention_center_name
    - detention_center_state
    - detention_center_city
    - detention_center_aor
    - detention_center_type_detailed
    - detention_center_contractor_type
    - ice_press_release
    - ice_death_report
    - death_location_validation
    - latitude
    - longitude
    - last_updated
  qa:
    strict: false
    required_columns:  # These should never have NA values
      - name
      - dod
      - latitude
      - longitude
    suspect_checks:  # Weird stuff to look out for
      - condition: "!(death_state %in% usdata::state_stats$state)"
        value_col: death_state
        index_col: name
        strict: false
      - condition: "is.na(death_city)"
        value_col: death_city
        index_col: name
        strict: false
      - condition: "is.na(death_location)"
        value_col: death_city
        index_col: name
        strict: false
      - condition: "is.na(dob)"
        value_col: dob
        index_col: name
        strict: false
      - condition: "is.na(detention_center_id)"
        value_col: detention_center_id
        index_col: name
        strict: false
