name: Trigger App Deploy

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'Data/Output/ice_deaths_by_year_facility.csv'

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger development deploy
        if: github.ref == 'refs/heads/development'
        run: |
          curl -X POST "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/builds" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "development"}'

      - name: Trigger production deploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/builds" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'